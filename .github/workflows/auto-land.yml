# Lands the nightly research branches (research/*) automatically onto main —
# so nobody has to merge by hand. Runs on push to a research/* branch AND, as a
# safety net, shortly after the nightly run (in case the push trigger fails).
name: Auto-land research

on:
  push:
    branches: ['research/**']
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 04:00 Berlin, ~1h after the research routine
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-land
  cancel-in-progress: false

jobs:
  land:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge research/* branches into main
        id: land
        run: |
          git config user.name "Field"
          git config user.email "field@users.noreply.github.com"
          git fetch origin '+refs/heads/research/*:refs/remotes/origin/research/*' || true
          landed=0
          for b in $(git branch -r | sed 's/^[* ] *//' | grep '^origin/research/'); do
            name="${b#origin/}"
            echo "::group::landing $name"
            if git merge --no-edit "$b"; then
              if git push origin main && git push origin --delete "$name"; then
                landed=$((landed+1))
              else
                echo "push failed for $name"
              fi
            else
              echo "merge conflict on $name — skipping"
              git merge --abort || true
            fi
            echo "::endgroup::"
          done
          echo "landed $landed branch(es)"
          echo "landed=$landed" >> "$GITHUB_OUTPUT"

      # Promptness: once something has landed on main, trigger the website integration
      # immediately (instead of waiting for the site's safety-net cron). Cross-repo →
      # repository_dispatch. Needs the secret SITE_DISPATCH_TOKEN (a token with
      # contents:write on frankbueltge/frankbueltge.de); the built-in GITHUB_TOKEN does
      # not reach across repos. If the secret is missing, the step is skipped cleanly.
      - name: Trigger site integrate
        if: ${{ steps.land.outputs.landed != '0' }}
        env:
          SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$SITE_DISPATCH_TOKEN" ]; then
            echo "::warning::SITE_DISPATCH_TOKEN missing — skipping dispatch (integrate will run on the site's cron)"
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $SITE_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/frankbueltge/frankbueltge.de/dispatches \
            -d '{"event_type":"field-landed"}')
          if [ "$code" = "204" ]; then
            echo "dispatch ok (HTTP 204) — field-integrate triggered"
          else
            echo "::warning::dispatch failed (HTTP $code) — integrate will run on the site's cron"
          fi
